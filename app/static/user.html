<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Interview Call</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0f1e;
      --surface: #0f172a;
      --surface2: #1e293b;
      --border: rgba(99,102,241,0.18);
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --accent3: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --glow: rgba(99,102,241,0.25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ---- animated background ---- */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 10% 20%, rgba(99,102,241,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 90% 80%, rgba(139,92,246,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 50% 50%, rgba(6,182,212,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: 820px;
      margin: 0 auto;
      padding: 34px 20px;
    }

    .card {
      background: rgba(15,23,42,0.7);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      backdrop-filter: blur(20px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.25);
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    p {
      margin: 0 0 16px;
      line-height: 1.75;
      color: var(--muted);
    }

    input {
      width: 100%;
      background: rgba(15,23,42,0.8);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 18px;
      border-radius: 10px;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 25px rgba(99,102,241,0.5);
    }

    .btn-warning {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: white;
      box-shadow: 0 4px 20px rgba(245,158,11,0.25);
    }

    .btn-danger {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      box-shadow: 0 4px 20px rgba(239,68,68,0.25);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
    }

    .status {
      padding: 16px;
      border-radius: 14px;
      background: rgba(15,23,42,0.35);
      border: 1px solid var(--border);
      margin-top: 10px;
      white-space: pre-wrap;
      color: var(--text);
    }

    .link-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 12px;
      position: relative;
      z-index: 1;
    }

    .link-button {
      background: rgba(99,102,241,0.12);
      color: var(--accent);
      text-decoration: none;
      border-radius: 14px;
      padding: 12px 16px;
      border: 1px solid rgba(99,102,241,0.3);
      display: inline-flex;
      align-items: center;
      font-weight: 700;
      transition: all 0.2s;
    }

    .link-button:hover {
      background: rgba(99,102,241,0.2);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <h1>AI Interview Call</h1>
      <p>This page simulates a direct candidate AI interview call. Press the button to have the AI answer and then ask a question during the call.</p>
      <form id="startCallForm">
        <label>Candidate phone number</label>
        <input id="callerNumber" type="text" value="+919000000123" placeholder="Enter phone number" />
        <button class="btn btn-primary" type="submit">📞 Call AI for interview</button>
      </form>

      <div id="callSection" style="display:none;">
        <div class="status" id="callStatus">Call connected. The AI is listening.</div>
        <div id="conversationStatus" class="status" style="min-height:260px; max-height:420px; margin-bottom: 14px; background:#f8fafc;
          padding:16px; border-radius:14px; white-space:pre-wrap;">
          The AI is ready. Press Speak and say your message.
        </div>
        <div style="display:flex; flex-wrap:wrap; gap:12px; margin-bottom:16px;">
          <button id="speakButton">Speak</button>
          <button id="stopButton" type="button" style="background:#f59e0b;" disabled>Stop</button>
          <button id="endCallButton" type="button" style="background:#ef4444;">End Call</button>
        </div>
        <div id="transcript" class="status" style="display:none;"></div>
      </div>
      <div id="result" class="status">No call has started yet.</div>
      <div class="link-row">
        <a class="link-button" href="/admin">Admin dashboard</a>
      </div>
    </div>
  </div>

  <script>
    const startCallForm = document.getElementById('startCallForm');
    const callSection = document.getElementById('callSection');
    const callStatus = document.getElementById('callStatus');
    const conversationStatus = document.getElementById('conversationStatus');
    const transcript = document.getElementById('transcript');
    const result = document.getElementById('result');
    const speakButton = document.getElementById('speakButton');
    const stopButton = document.getElementById('stopButton');
    let currentCallSid = null;
    let callerNumberValue = '';
    let recognition = null;
    let wantsContinuousListening = false;
    let recognitionActive = false;
    let pausedForAI = false;

    function appendTranscript(sender, message) {
      const marker = sender === 'AI' ? 'AI says:' : sender === 'You' ? 'You say:' : 'System:';
      transcript.textContent += `${marker} ${message}\n`;
      transcript.style.display = 'block';
    }

    function speakText(text) {
      return new Promise(resolve => {
        if (!window.speechSynthesis) {
          resolve();
          return;
        }
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-IN';
        utterance.rate = 1.0;
        utterance.pitch = 1.0;
        utterance.onend = () => resolve();
        utterance.onerror = () => resolve();
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(utterance);
      });
    }

    function initSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        result.textContent = 'Speech recognition is not supported in this browser.';
        speakButton.disabled = true;
        return null;
      }

      const rec = new SpeechRecognition();
      rec.lang = 'en-IN';
      rec.interimResults = false;
      rec.maxAlternatives = 1;
      rec.continuous = true;

      rec.onstart = () => {
        recognitionActive = true;
      };

      rec.onresult = event => {
        const recognizedText = event.results[0][0].transcript.trim();
        if (recognizedText) {
          appendTranscript('You', recognizedText);
        // Real Twilio calls are audio-only; user speech is handled by Twilio.
        // Keep this handler inert.
        }
      };


      rec.onerror = event => {
        result.textContent = 'Voice recognition error: ' + event.error;
        stopListening();
      };

      rec.onend = () => {
        recognitionActive = false;
        if (wantsContinuousListening && !pausedForAI) {
          recognition.start();
          return;
        }
        speakButton.disabled = false;
        stopButton.disabled = true;
        if (wantsContinuousListening) {
          conversationStatus.textContent = 'Listening paused while the AI responds...';
        } else {
          conversationStatus.textContent = 'Listening stopped. Press Speak to continue.';
        }
      };

      return rec;
    }

    function startListening() {
      if (!recognition) {
        result.textContent = 'Speech recognition unavailable.';
        return;
      }
      if (!currentCallSid) {
        result.textContent = 'Start the call before speaking.';
        return;
      }
      wantsContinuousListening = true;
      pausedForAI = false;
      try {
        recognition.start();
        recognitionActive = true;
        speakButton.disabled = true;
        stopButton.disabled = false;
        conversationStatus.textContent = 'Listening continuously... speak anytime.';
        result.textContent = 'Listening for your voice...';
      } catch (error) {
        result.textContent = 'Unable to start microphone: ' + error.message;
      }
    }

    function stopListening() {
      wantsContinuousListening = false;
      pausedForAI = false;
      if (recognition && recognitionActive) {
        recognition.stop();
      }
      recognitionActive = false;
      speakButton.disabled = false;
      stopButton.disabled = true;
      conversationStatus.textContent = 'Stopped listening. Press Speak to resume.';
      result.textContent = 'Microphone listening stopped.';
    }

    // sendSpeechToAI is used only for browser-based simulation.
    // Twilio real calls don't need a browser microphone -> server question loop.
    async function sendSpeechToAI(text) {
      result.textContent = 'Speech-to-AI via browser simulation is disabled for real Twilio calls.';

      conversationStatus.textContent = `You said: ${text}`;
      if (recognitionActive) {
        pausedForAI = true;
        recognition.stop();
      }
      try {
        const response = await fetch('/simulate-call/question', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ call_sid: currentCallSid, caller_number: callerNumberValue, user_text: text })
        });

        const data = await response.json();
        if (!response.ok) {
          result.textContent = `AI response error: ${data.detail || response.statusText}`;
          pausedForAI = false;
          return;
        }
        appendTranscript('AI', data.answer);
        conversationStatus.textContent = 'AI is replying...';
        result.textContent = 'AI is generating a response...';
        await speakText(data.answer);
        pausedForAI = false;
        if (wantsContinuousListening) {
          conversationStatus.textContent = 'Listening continuously... speak anytime.';
          try {
            recognition.start();
          } catch (error) {
            console.warn('Could not restart recognition:', error);
          }
        } else {
          conversationStatus.textContent = 'AI replied. Press Speak to continue.';
        }
        result.textContent = `AI replied. Transferred: ${data.transferred ? 'Yes' : 'No'}`;
        if (data.transferred) {
          callStatus.textContent = 'AI has transferred the call to a human agent.';
          appendTranscript('System', 'The call has been transferred to a human agent.');
        }
      } catch (error) {
        result.textContent = 'Error sending speech to AI: ' + error.message;
        pausedForAI = false;
      }
    }

    startCallForm.addEventListener('submit', async event => {
      event.preventDefault();
      const callerNumber = document.getElementById('callerNumber').value.trim();
      if (!callerNumber) {
        result.textContent = 'Please enter a valid phone number to start the call.';
        return;
      }
      try {
        const response = await fetch('/interview-call/start', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ caller_number: callerNumber })
        });

        const data = await response.json();
        if (!response.ok) {
          result.textContent = `Call failed: ${data.detail || response.statusText}`;
          return;
        }
        currentCallSid = data.call_sid;
        callerNumberValue = callerNumber;
        callSection.style.display = 'block';
        startCallForm.style.display = 'none';
        result.textContent = 'Call started. Speak to the AI now.';
        callStatus.textContent = 'Call connected.';
        conversationStatus.textContent = data.greeting;
        transcript.textContent = '';
        transcript.style.display = 'block';
        appendTranscript('AI', data.greeting);
      } catch (error) {
        result.textContent = 'Unable to connect call: ' + error.message;
      }
    });

    document.getElementById('speakButton').addEventListener('click', event => {
      event.preventDefault();
      startListening();
    });

    document.getElementById('stopButton').addEventListener('click', event => {
      event.preventDefault();
      stopListening();
    });

    document.getElementById('endCallButton').addEventListener('click', async event => {
      event.preventDefault();
      if (!currentCallSid) {
        result.textContent = 'No call is active.';
        return;
      }
      stopListening();
      try {
        // In real Twilio calls, the server controls the call lifecycle; no browser "simulate-call/end".
        // Keep the UI button as a no-op.
        return;

        const data = await response.json();
        if (!response.ok) {
          result.textContent = `Unable to end call: ${data.detail || response.statusText}`;
          return;
        }
        appendTranscript('System', 'Call ended. Conversation data has been sent to the admin dashboard.');
        callStatus.textContent = 'Call ended.';
        conversationStatus.textContent = 'Call ended. Open the admin dashboard to review the transcript.';
        result.textContent = `Call ${data.call_sid} ended successfully.`;
        currentCallSid = null;
        startCallForm.style.display = 'block';
        callSection.style.display = 'none';
      } catch (error) {
        result.textContent = 'Unable to end call: ' + error.message;
      }
    });

    recognition = initSpeechRecognition();
  </script>
</body>
</html>
